version: '3'

tasks:
  test:
    desc: Run unit tests
    vars:
      ARGS: '{{default "./..." .CLI_ARGS}}'
    cmds:
      - go tool -modfile tools/go.mod gotestsum -- -race {{.ARGS}}

  check:
    desc: Run all static checks
    cmds:
      - task: lint
      - task: license
        vars:
          CLI_ARGS: -check .
      - task: mod-tidy
        vars:
          CLI_ARGS: -diff

  fix:
    desc: Auto-fix static checks
    cmds:
      - task: fmt
      - task: license
      - task: mod-tidy
      - task: lint
        vars:
          CLI_ARGS: ./... --fix

  lint:
    desc: Run golangci-lint
    vars:
      ARGS: '{{default "./..." .CLI_ARGS}}'
    cmds:
      - go tool -modfile tools/go.mod golangci-lint run {{.ARGS}}

  fmt:
    desc: Format the code
    vars:
      ARGS: '{{default "./..." .CLI_ARGS}}'
    cmds:
      - go tool -modfile tools/go.mod golangci-lint fmt {{.ARGS}}

  license:
    desc: Manage license headers
    vars:
      ARGS: '{{default "." .CLI_ARGS}}'
    cmds:
      - |
        go tool -modfile tools/go.mod addlicense \
          -c "Pete Steyert-Woods" \
          -l apache \
          -s \
          -ignore ".idea/**" \
          -ignore ".github/**" \
          -ignore ".claude/**" \
          -ignore "coverage.*" \
          {{.ARGS}}

  mod-tidy:
    desc: Run 'go mod tidy'
    vars:
      ARGS: '{{default "-v" .CLI_ARGS}}'
    cmds:
      - go mod tidy {{.ARGS}}
      - go -C tools mod tidy {{.ARGS}}

  mod-download:
    desc: Run 'go mod download'
    cmds:
      - go mod download
      - go mod download -modfile tools/go.mod

  generate:
    desc: Run go generate
    cmds:
      - go generate ./...

  # CI tasks

  ci:test:
    desc: Run unit tests with coverage and produce a Cobertura XML report
    cmds:
      - task: test
        vars:
          CLI_ARGS: -count=1 -covermode=atomic -coverprofile=coverage.out ./...
      - go tool -modfile tools/go.mod gocover-cobertura < coverage.out > coverage.xml

  ci:check:
    desc: Check no uncommitted diffs after generate/fmt/tidy
    cmds:
      - task: lint
      - task: license
        vars:
          CLI_ARGS: -check .
      - task: mod-tidy
        vars:
          CLI_ARGS: -diff
      - task: generate
      - git diff --exit-code
